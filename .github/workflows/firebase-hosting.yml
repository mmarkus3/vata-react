# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache node modules
        uses: actions/cache@v5
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm # npm cache files are stored in `~/.npm` on Linux/macOS
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{
            hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: Make envfile
        uses: SpicyPizza/create-envfile@v2.0
        with:
          envkey_EXPO_PUBLIC_FIREBASE_API_KEY: ${{secrets.EXPO_PUBLIC_FIREBASE_API_KEY}}
          envkey_EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN}}
          envkey_EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID}}
          envkey_EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET}}
          envkey_EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}}
          envkey_EXPO_PUBLIC_FIREBASE_APP_ID: ${{secrets.EXPO_PUBLIC_FIREBASE_APP_ID}}
          envkey_EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID}}
      - name: Build
        run: npm ci && npm run predeploy
      - name: Deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VATA_APP_B0114 }}
          projectId: vata-app-b0114
          target: vata-prod
